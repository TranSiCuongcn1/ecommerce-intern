server:
  port: 8080

spring:
  application:
    name: ecommerce-api
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    ignore-migration-patterns: "*:missing"

  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: "replace-this-secret-with-a-long-random-value-for-real-projects"
    expiration-minutes: 60
  cloudinary:
    cloud-name: "${CLOUDINARY_CLOUD_NAME:your-cloud-name}"
    api-key: "${CLOUDINARY_API_KEY:your-api-key}"
    api-secret: "${CLOUDINARY_API_SECRET:your-api-secret}"
    folder: "ecommerce/products"

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
