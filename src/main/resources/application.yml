server:
  port: 8080

spring:
  application:
    name: ecommerce-api
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/ecommerce_db
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    ignore-migration-patterns: "*:missing"

  data:
    redis:
      host: 127.0.0.1
      port: 6379

app:
  jwt:
    secret: "${JWT_SECRET:replace-this-secret-with-a-long-random-value-for-real-projects}"
    expiration-minutes: "${JWT_EXPIRATION_MINUTES:60}"
    refresh-expiration-days: "${JWT_REFRESH_EXPIRATION_DAYS:7}"
  minio:
    endpoint: "${MINIO_ENDPOINT:http://127.0.0.1:9000}"
    access-key: "${MINIO_ACCESS_KEY:minioadmin}"
    secret-key: "${MINIO_SECRET_KEY:minioadmin}"
    bucket: "${MINIO_BUCKET_NAME:ecommerce-products}"
    public-url: "${MINIO_PUBLIC_URL:http://127.0.0.1:9000}"
  admin:
    bootstrap:
      enabled: "${APP_ADMIN_BOOTSTRAP_ENABLED:true}"
      full-name: "${APP_ADMIN_FULL_NAME:Local Admin}"
      email: "${APP_ADMIN_EMAIL:admin@example.com}"
      password: "${APP_ADMIN_PASSWORD:admin123456}"
  momo:
    partner-code: "${MOMO_PARTNER_CODE:MOMOBKUN20180529}"
    access-key: "${MOMO_ACCESS_KEY:klm05TvNBzhg7h7j}"
    secret-key: "${MOMO_SECRET_KEY:at67qH6mk8w5Y1nAyMoYKMWACiEi2bsa}"
    api-url: "${MOMO_API_URL:https://test-payment.momo.vn/v2/gateway/api/create}"
    redirect-url: "${MOMO_REDIRECT_URL:http://localhost:8080/api/payments/momo/redirect}"
    ipn-url: "${MOMO_IPN_URL:https://example.com/momo-ipn}"
  vnpay:
    tmn-code: "${VNPAY_TMN_CODE:85C9X2P3}"
    hash-secret: "${VNPAY_HASH_SECRET:Y2JMW14J38MOM6E0MIFLFWWNTDB2N5OW}"
    pay-url: "${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}"
    return-url: "${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/redirect}"
    ipn-url: "${VNPAY_IPN_URL:https://example.com/api/payments/vnpay-ipn}"

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

management:
  endpoints:
    web:
      base-path: /api
  endpoint:
    health:
      show-details: always
